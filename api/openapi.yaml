              schema:
                $ref: "#/components/schemas/search_200_response"
            text/markdown:
              schema:
                description: Plain markdown search results without JSON wrapper
                type: string
          description: Success
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorEnvelope"
          description: Invalid request parameters
        "401":
          content:
            application/json:
              examples:
                default:
                  summary: Response with unauthorized error
                  value:
                    meta:
                      id: 69c3f5c4168f66b860e951c585550f1c
                      node: us-central1
                      ms: 213
                    data: null
                    error:
                    - code: "2"
                      url: https://help.kagi.com/api/errors#unauthorized

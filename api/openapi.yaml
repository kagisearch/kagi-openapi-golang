          description: Access token is missing or invalid
      security:
      - kagi-translate: []
      summary: List Supported Languages
      tags:
      - Translate
      x-codeSamples:
      - lang: curl
        label: Curl
        source: |
          curl -X GET "https://translate.kagi.com/api/list-languages?type=target" \
            -H "Authorization: Bearer YOUR_API_KEY"
      - lang: JavaScript
        label: JavaScript
        source: |
          const response = await fetch(
            'https://translate.kagi.com/api/list-languages?type=target',
            {
              method: 'GET',
              headers: {
                'Authorization': 'Bearer YOUR_API_KEY'
              }
            }
          );
          const languages = await response.json();
          console.log(languages);
    servers:
    - description: Translate production endpoint
      url: https://translate.kagi.com
  /api/romanize:
    get:
      description: "Converts non-Latin script text to Latin script (romanization/transliteration).\
        \ Uses standardized romanization styles for each language: Hepburn for Japanese,\
        \ Pinyin for Chinese, ALA-LC for Arabic, etc."
      operationId: translateRomanize
      parameters:
      - description: Text to romanize
        examples:
          japaneseText:
            value: こんにちは
          russianText:
            value: Привет мир
          chineseText:
            value: 你好世界
        explode: true
        in: query
        name: text
        required: true
        schema:
          type: string
        style: form
      - description: Language code (ISO-639) of the source text
        examples:
          japaneseText:
            value: ja
          russianText:
            value: ru
          chineseText:
            value: zh
        explode: true
        in: query
        name: language
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                japaneseText:
                  value:
                    romanization: konnichiwa
                russianText:
                  value:
                    romanization: Privet mir
                chineseText:
                  value:
                    romanization: nǐ hǎo shì jiè
                arabicText:
                  value:
                    romanization: marḥaban bil-ʿālam
                hebrewText:
                  value:
                    romanization: shalom olam
                thaiText:
                  value:
                    romanization: sawatdi chao lok
                koreanText:
                  value:
                    romanization: annyeonghaseyo segye
                greekText:
                  value:
                    romanization: geia sou kosme

    servers:
    - description: Translate production endpoint
      url: https://translate.kagi.com
  /api/word-insights:
    post:
      description: |
        Provides detailed linguistic insights and alternatives for translated text. The API identifies 3-5 key
        words or phrases in the translated text that have meaningful alternative expressions, and returns:

        1. A marked version of the translation with insight markers
        2. Alternative expressions for each identified word/phrase
        3. Brief explanations for each alternative in the target explanation language
        4. Type labels categorizing each insight (e.g., "Lexical choice", "Cultural reference")
      operationId: translateWordInsights
      requestBody:
        content:
          multipart/form-data:
            examples:
              englishToSpanish:
                value:
                  original_text: Hello world
                  translated_text: Hola mundo
                  target_explanation_language: en
            schema:
              $ref: "#/components/schemas/translateWordInsights_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                spanishInsight:
                  value:
                    marked_translation: <<INSIGHT_1>> <<INSIGHT_2>>
                    insights:
                    - id: INSIGHT_1
                      original_text: Hola
                      variations:
                      - text: Hola
                        explanation: "Casual, everyday greeting"
                      - text: Saludos
                        explanation: "More formal, broader greeting"
                      - text: Qué tal
                        explanation: "Casual, implies 'how are you'"
                      type: Greeting style
                    - id: INSIGHT_2
                      original_text: mundo
                      variations:
                      - text: mundo
                        explanation: Literal translation of 'world'
                      - text: a todos
                        explanation: Addresses people directly
                      type: Object reference
              schema:
                $ref: "#/components/schemas/translateWordInsights_200_response"
          description: Detailed linguistic insights for the translated text
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateWordInsights_400_response"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateAlternatives_401_response"
          description: Unauthorized
        "402":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateAlternatives_402_response"
          description: Payment Required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateWordInsights_500_response"
          description: Server error
      security:
      - kagi-translate: []
      summary: Word Insights
      tags:
      - Translate
      x-codeSamples:
      - lang: curl
        label: Curl
        source: |
          curl -X POST "https://translate.kagi.com/api/word-insights" \
            -H "Authorization: Bearer YOUR_API_KEY" \
            -H "Content-Type: multipart/form-data" \
            -F "original_text=Hello world" \
            -F "translated_text=Hola mundo" \
            -F "target_explanation_language=en"
      - lang: JavaScript
        label: JavaScript
        source: |
          const formData = new FormData();
          formData.append('original_text', 'Hello world');
          formData.append('translated_text', 'Hola mundo');
          formData.append('target_explanation_language', 'en');

          const response = await fetch(
            'https://translate.kagi.com/api/word-insights',
            {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer YOUR_API_KEY'
              },
              body: formData
            }
          );

          const data = await response.json();
          console.log(data);
    servers:
    - description: Translate production endpoint
      url: https://translate.kagi.com
  /api/translate:
    post:
      description: "Translates text between languages with customizable options for\
        \ gender, formality, and style. Supports both single text translation and\
        \ efficient batch translation of multiple text snippets with context awareness."
      operationId: translate
      requestBody:
        content:
          application/json:
            examples:
              basicTranslation:
                description: Simple text translation from English to Spanish
                summary: Basic Translation
                value:
                  text: Hello world
                  source_lang: en
                  target_lang: es
              batchTranslation:
                description: Translate multiple texts at once from English to French
                summary: Batch Translation
                value:
                  text:
                  - How are you?
                  - The sun is shining
                  - I am happy to meet you
                  source_lang: en
                  target_lang: fr
              formalTranslation:
                description: Translation with formal language from English to German
                summary: Formal Translation
                value:
                  text: Can you help me?
                  source_lang: en
                  target_lang: de
                  formality: more
              genderedTranslation:
                description: Translation with specific gender context
                summary: Gendered Translation
                value:
                  text: I am happy to meet you
                  source_lang: en
                  target_lang: fr
                  speaker_gender: feminine
              streamingTranslation:
                description: Get translation results as a stream of text chunks
                summary: Streaming Translation
                value:
                  text: Hello world
                  source_lang: en
                  target_lang: es
                  stream: true
              dictionaryLookup:
                description: Get translation with dictionary definitions
                summary: Dictionary Lookup
                value:
                  text: casa
                  source_lang: es
                  target_lang: en
                  dictionary_language: en
            schema:
              $ref: "#/components/schemas/translate_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                basicTranslation:
                  description: Simple text translation response
                  summary: Basic Translation
                  value:
                    translation: Hola mundo
                    detectedLanguage:
                      iso: en
                      label: English
                batchTranslation:
                  description: Response for multiple texts translated at once
                  summary: Batch Translation
                  value:
                    snippets:
                    - Comment ça va?
                    - Le soleil brille
                    - Je suis heureux de vous rencontrer
                formalTranslation:
                  description: Response with formal language translation
                  summary: Formal Translation
                  value:
                    translation: Können Sie mir helfen?
                    detectedLanguage:
                      iso: en
                      label: English
                genderedTranslation:
                  description: Response with gendered language
                  summary: Gendered Translation
                  value:
                    translation: Je suis heureuse de vous rencontrer
                    detectedLanguage:
                      iso: en
                      label: English
                dictionaryLookup:
                  description: Response with dictionary definition
                  summary: Dictionary Lookup Response
                  value:
                    translation: house
                    detectedLanguage:
                      iso: es
                      label: Spanish
                    definition:
                      word: casa
                      phonetic: /ˈkasa/
                      definitions:
                      - partOfSpeech: noun
                        meanings:
                        - definition: "A building for human habitation, especially\
                            \ one that is lived in by a family or small group of people"
                          example: Vivo en una casa grande
                          synonyms:
                          - home
                          - residence
                          - dwelling
                          - domicile
              schema:
                $ref: "#/components/schemas/translate_200_response"
            text/event-stream:
              examples:
                streamingTranslation:
                  description: Server-sent event stream format example
                  summary: Streaming Translation
                  value: |
                    # First event contains detected language event: message data: {"detectedLanguage":{"iso":"en","label":"English"}}

                    # Dictionary definition (if requested) event: message data: {"definition":{"word":"hello","phonetic":"/həˈloʊ/","definitions":[{"partOfSpeech":"exclamation","meanings":[{"definition":"Used as a greeting or to begin a phone conversation","example":"hello there, Katie!","synonyms":["hi","greetings"]}]}]}}

                    # Subsequent events contain translation chunks event: message data: {"delta":"Hola"}

                    event: message data: {"delta":" mundo"}
              schema:
                description: Server-sent events stream of translation chunks
                type: string
          description: Successful translation
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translate_400_response"
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translate_500_response"
          description: Server error
      security:
      - kagi-translate: []
      summary: Text Translation
      tags:
      - Translate
      x-codeSamples:
      - lang: curl
        label: Curl
        source: |
          curl -X POST "https://translate.kagi.com/api/translate" \
            -H "Authorization: Bearer YOUR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "Hello world",
              "source_lang": "en",
              "target_lang": "es"
            }'
      - lang: JavaScript
        label: JavaScript
        source: |
          const response = await fetch('https://translate.kagi.com/api/translate', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer YOUR_API_KEY',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              text: 'Hello world',
              source_lang: 'en',
              target_lang: 'es'
            })
          });
          const data = await response.json();
          console.log(data.translation);
    servers:
    - description: Translate production endpoint
      url: https://translate.kagi.com
components:
  responses:
    unauthorized:
      content:
        application/json:
          examples:
            default:
              summary: Response with unauthorized error
              value:
                meta:
                  id: 69c3f5c4168f66b860e951c585550f1c
                  node: us-central1
                  ms: 213
                data: null
                error:
                - code: "2"
                  url: https://help.kagi.com/api/errors#unauthorized
                  message: Unauthorized
                  location: null
          schema:
            $ref: "#/components/schemas/errorEnvelope"
      description: Access token is missing or invalid
  schemas:
    meta:
      additionalProperties: true
      description: This object is subject to change as it is provided for debugging

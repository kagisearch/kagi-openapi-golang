    translateAlternatives_request:
      properties:
        original_text:
          description: "Original text to translate. In partial mode, this serves as\
            \ context for the phrase (may be ignored if not relevant)."
          type: string
        existing_translation:
          description: "In standard mode: existing full translation of the original\
            \ text. In partial mode: the specific phrase you want alternative ways\
            \ to express."
          type: string
        source_lang:
          description: Source language code (ISO-639) of the original text. Helps
            provide more accurate alternatives by understanding language-specific
            nuances.
          type: string
        target_lang:
          description: Target language code (ISO-639) for the translations
          type: string
        target_explanation_language:
          default: en
          description: Language code (ISO-639) for the explanations
          type: string
        translation_options:
          description: |
            JSON string with translation customization options:
            - `formality`: Controls formality level ["default", "more", "less"]
            - `speaker_gender`: Gender of the speaker ["unknown", "feminine", "masculine", "neutral"]
            - `addressee_gender`: Gender of the person being addressed ["unknown", "feminine", "masculine", "neutral"]
            - `style`: Translation style ["natural", "literal"]
            - `context`: Additional context to inform translation (string)
          example: "{\"formality\":\"more\",\"speaker_gender\":\"feminine\",\"style\"\
            :\"natural\"}"
          type: string
        partial_translation:
          default: "false"
          description: "Mode switch: 'false' for standard mode (full translation alternatives),\
            \ 'true' for partial mode (alternative ways to phrase a specific part)"
          type: string
      required:
      - existing_translation
      - original_text
      - target_lang
      type: object
    translateAlternatives_200_response_elements_inner:
      example:
        translation: translation
        explanation: explanation
      properties:
        translation:
          description: Alternative translation or phrasing
          type: string
        explanation:
          description: Explanation of the alternative in the requested language
          type: string
      type: object
    translateAlternatives_200_response:
      example:
        elements:
        - translation: translation
          explanation: explanation
        - translation: translation
          explanation: explanation
        originalDescription: originalDescription

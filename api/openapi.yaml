  /alternative-translations:
    post:
      description: "Provides alternative translation options for a given text with\
        \ explanations. Supports two modes: standard mode (alternatives for a full\
        \ translation) and partial mode (alternative ways to phrase a specific part\
        \ of a translation)."
      operationId: translateAlternatives
      requestBody:
        content:
          multipart/form-data:
            examples:
              standardMode:
                description: Getting alternative full translations
                summary: Standard Mode
                value:
                  original_text: Hello world
                  existing_translation: Hola mundo
                  source_lang: en
                  target_lang: es
                  target_explanation_language: en
                  partial_translation: "false"
              partialMode:
                description: Getting alternative phrasings for a specific part
                summary: Partial Mode
                value:
                  original_text: We need to inform our team about a schedule change.
                    The meeting is postponed. It will be rescheduled to 10am tomorrow.
                  existing_translation: La riunione è stata posticipata
                  source_lang: en
                  target_lang: it
                  target_explanation_language: en
                  partial_translation: "true"
              withOptions:
                description: Using translation options for customized alternatives
                summary: With Translation Options
                value:
                  original_text: I am pleased to meet you
                  existing_translation: Encantado de conocerte
                  source_lang: en
                  target_lang: es
                  target_explanation_language: en
                  partial_translation: "false"
                  translation_options: "{\"formality\":\"more\",\"speaker_gender\"\
                    :\"masculine\"}"
            schema:
              $ref: "#/components/schemas/translateAlternatives_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                standardModeResponse:
                  summary: Standard Mode Response
                  value:
                    originalDescription: "Standard greeting in Spanish, informal but\
                      \ polite, commonly used in everyday situations"
                    elements:
                    - translation: Saludos al mundo
                      explanation: This alternative uses 'Saludos' (Greetings) instead
                        of 'Hola' for a slightly more formal greeting.
                    - translation: "Qué tal, mundo"
                      explanation: "Uses the informal greeting 'Qué tal' which is\
                        \ similar to 'What's up' in English, making it more casual."
                partialModeResponse:
                  summary: Partial Mode Response
                  value:
                    originalDescription: Italian phrase indicating that a meeting
                      has been postponed
                    elements:
                    - translation: L'incontro è stato rinviato
                      explanation: Uses 'l'incontro' (the meeting) and 'rinviato'
                        (postponed/rescheduled) for a slightly more formal tone.
                    - translation: La riunione è rimandata
                      explanation: "Uses 'rimandata' (delayed/postponed) which has\
                        \ a slightly different connotation, implying a brief delay."
              schema:
                $ref: "#/components/schemas/translateAlternatives_200_response"
          description: Alternative translations with explanations
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateAlternatives_401_response"
          description: Unauthorized
        "402":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateAlternatives_402_response"
          description: Payment Required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateAlternatives_500_response"
          description: Server error
      security:
      - kagi-translate: []
      summary: Alternative Translations
      tags:
      - Translate
      x-codeSamples:
      - lang: curl
        label: Curl (Standard Mode)
        source: |
          curl -X POST "https://translate.kagi.com/api/alternative-translations" \
            -H "Authorization: Bearer YOUR_API_KEY" \
            -F "original_text=Hello world" \
            -F "existing_translation=Hola mundo" \
            -F "source_lang=en" \
            -F "target_lang=es" \
            -F "target_explanation_language=en" \
            -F "partial_translation=false" \
            -F 'translation_options={"formality":"more","speaker_gender":"feminine"}'
      - lang: curl
        label: Curl (Partial Mode)
        source: |
          curl -X POST "https://translate.kagi.com/api/alternative-translations" \
            -H "Authorization: Bearer YOUR_API_KEY" \
            -F "original_text=We need to inform our team about a schedule change. The meeting is postponed. It will be rescheduled to 10am tomorrow." \
            -F "existing_translation=La riunione è stata posticipata" \
            -F "source_lang=en" \
            -F "target_lang=it" \
            -F "target_explanation_language=en" \
            -F "partial_translation=true"
      - lang: JavaScript
        label: JavaScript (Standard Mode)
        source: |
          const formData = new FormData();
          formData.append('original_text', 'Hello world');
          formData.append('existing_translation', 'Hola mundo');
          formData.append('source_lang', 'en');
          formData.append('target_lang', 'es');
          formData.append('target_explanation_language', 'en');
          formData.append('partial_translation', 'false');

          // Optional: Add translation options for more control
          const translationOptions = {
            formality: 'more',            // Controls formality level
            speaker_gender: 'feminine',    // For gender-specific languages
            addressee_gender: 'masculine', // For languages with gendered address forms
            style: 'natural'              // Translation style preference
          };
          formData.append('translation_options', JSON.stringify(translationOptions));

          const response = await fetch(
            'https://translate.kagi.com/api/alternative-translations',
            {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer YOUR_API_KEY'
              },
              body: formData
            }
          );

          const data = await response.json();
          console.log(data.elements);
      - lang: JavaScript
        label: JavaScript (Partial Mode)
        source: |
          const formData = new FormData();
          // Original text provides context but may not be needed in partial mode
          formData.append('original_text', 'We need to inform our team about a schedule change. The meeting is postponed. It will be rescheduled to 10am tomorrow.');
          // In partial mode, this is the phrase you want alternative phrasings for
          formData.append('existing_translation', 'La riunione è stata posticipata');
          formData.append('source_lang', 'en');
          formData.append('target_lang', 'it');
          formData.append('target_explanation_language', 'en');
          formData.append('partial_translation', 'true');

          const response = await fetch(
            'https://translate.kagi.com/api/alternative-translations',
            {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer YOUR_API_KEY'
              },
              body: formData
            }
          );

          const data = await response.json();
          console.log(data.elements);
    servers:
    - description: Translate production endpoint
      url: https://translate.kagi.com
  /api/detect:
    post:
      description: Detects the language of the provided text.
      operationId: translateDetect
      requestBody:
        content:
          application/json:
            examples:
              englishDetection:
                value:
                  text: Hello world
              spanishDetection:
                value:
                  text: Hola mundo
              frenchDetection:
                value:
                  text: Bonjour le monde
            schema:
              $ref: "#/components/schemas/translateDetect_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                englishDetection:
                  value:
                    iso: en
                    label: English
                spanishDetection:
                  value:
                    iso: es
                    label: Spanish
                frenchDetection:
                  value:
                    iso: fr
                    label: French
              schema:
                $ref: "#/components/schemas/translateDetect_200_response"
          description: Successful language detection
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateDetect_400_response"
          description: Bad request
      security:
      - kagi-translate: []
      summary: Language Detection
      tags:
      - Translate
      x-codeSamples:
      - lang: curl
        label: Curl
        source: |
          curl -X POST "https://translate.kagi.com/api/detect" \
            -H "Authorization: Bearer YOUR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"text": "Hello world"}'
      - lang: JavaScript
        label: JavaScript
        source: |
          const response = await fetch('https://translate.kagi.com/api/detect', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer YOUR_API_KEY',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              text: 'Hello world'
            })
          });
          const data = await response.json();
          console.log(data);
    servers:
    - description: Translate production endpoint
      url: https://translate.kagi.com
  /api/dictionary:
    post:
      description: |
        Provides dictionary definitions for words in different languages.

        **Translation behavior:**
        - Fields translated to `definition_language`: definition, notes, etymology, part_of_speech, usage_level, dialect
        - Fields that remain in `word_language`: word, synonyms, pronunciation, plural, related_words, examples (with translations in parentheses when languages differ)
        - Fields always in English (strict enums): gender ("masculine", "feminine", "neuter", "common"), temporal_trend ("increasing", "stable", "decreasing")
      operationId: translateDictionary
      requestBody:
        content:
          application/json:
            examples:
              basicDefinition:
                description: Simple word definition lookup
                summary: Basic Definition
                value:
                  word: hello
                  word_language: en
                  definition_language: en
              crossLanguageDefinition:
                description: Get definition in a different language
                summary: Cross-language Definition
                value:
                  word: hola
                  word_language: es
                  definition_language: en
              streamingDefinition:
                description: Get definition with streaming response
                summary: Streaming Definition
                value:
                  word: hello
                  word_language: en
                  definition_language: en
                  stream: true
              safeDefinition:
                description: Get definition with NSFW content filtering enabled
                summary: Safe Definition (NSFW filtered)
                value:
                  word: hello
                  word_language: en
                  definition_language: en
                  nsfw: false
            schema:
              $ref: "#/components/schemas/translateDictionary_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                jsonDefinition:
                  description: Word definition as structured JSON
                  summary: JSON Definition
                  value:
                    definition:
                      word: hello
                      primary_meaning:
                        definition: Used as a greeting or to begin a phone conversation
                        part_of_speech:
                        - exclamation
                        usage_level:
                        - standard
                        dialect:
                        - US
                        - UK
                        synonyms:
                        - hi
                        - greetings
                        - hey
                        - howdy
                      secondary_meanings:
                      - definition: An expression of surprise
                        part_of_speech:
                        - exclamation
                        usage_level:
                        - informal
                        dialect:
                        - US
                        synonyms:
                        - wow
                        - oh my
                        - goodness
                      - definition: A call for attention
                        part_of_speech:
                        - noun
                        usage_level:
                        - standard
                      examples:
                      - "Hello, how are you?"
                      - Hello! I didn't see you there.
                      pronunciation: həˈloʊ
                      etymology: "From earlier hallo, hollo, which is from Old High\
                        \ German halâ, holâ"
                      notes: Be careful with tone - 'hello' can sound overly formal
                        in casual text messages where 'hi' or 'hey' might be preferred.
                      temporal_trend: stable
                    language:
                      iso: en
                      label: English
              schema:
                $ref: "#/components/schemas/translateDictionary_200_response"
            text/plain:
              example: |
                data: {"detected_language": {"iso": "en", "label": "English"}}

                data: {"definition_field": {"field": "word", "value": "hello"}}

                data: {"definition_field": {"field": "primary_meaning", "value": {"definition": "Used as a greeting or to begin a phone conversation", "part_of_speech": ["exclamation"], "usage_level": ["standard"], "synonyms": ["hi", "greetings", "hey"]}}}

                data: {"definition_field": {"field": "secondary_meaning", "value": {"definition": "An expression of surprise", "part_of_speech": ["exclamation"], "usage_level": ["informal"], "synonyms": ["wow", "oh my"]}}}

                data: {"definition_field": {"field": "examples", "value": ["Hello, how are you?", "Hello! I didn't see you there."]}}

                data: {"definition_field": {"field": "pronunciation", "value": "həˈloʊ"}}

                data: {"definition_field": {"field": "etymology", "value": "From earlier hallo, hollo"}}

                data: {"done": true}
              schema:
                description: Server-Sent Events format with definition fields
                type: string
          description: Successful dictionary lookup
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateDictionary_400_response"
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/translateDictionary_500_response"
          description: Server error
      security:
      - kagi-translate: []
      summary: Dictionary
      tags:
      - Translate
      x-codeSamples:
      - lang: curl
        label: Curl
        source: |
          curl -X POST "https://translate.kagi.com/api/dictionary" \
            -H "Authorization: Bearer YOUR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "word": "hello",
              "word_language": "en",
              "definition_language": "en"
            }'
      - lang: JavaScript
        label: JavaScript
        source: |
          const response = await fetch('https://translate.kagi.com/api/dictionary', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer YOUR_API_KEY',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              word: 'hello',
              word_language: 'en',
              definition_language: 'en'
            })
          });
          const data = await response.json();
          console.log(data.definition);
      - lang: curl
        label: Curl (Streaming)
        source: |
          curl -X POST "https://translate.kagi.com/api/dictionary" \
            -H "Authorization: Bearer YOUR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "word": "hello",
              "word_language": "en",
              "definition_language": "en",
              "stream": true
            }' \
            --no-buffer
    servers:
    - description: Translate production endpoint
      url: https://translate.kagi.com
  /api/list-languages:
    get:
      description: |
        Returns a list of languages supported by the translation API.

        The response includes language codes, names, and whether each language supports formality settings.
      operationId: translateListLanguages
      parameters:
      - description: Type of languages to return ('source' or 'target')
        explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - source
          - target
          type: string
        style: form
      - description: "Locale code to use for language names (e.g., 'en', 'de', 'fr')"
        explode: true
        in: query
        name: locale
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                target:
                  summary: Example response for target languages
                  value:
                  - language: EN
                    name: English
                    supports_formality: false
                  - language: DE
                    name: German
                    supports_formality: true
                  - language: FR
                    name: French
                    supports_formality: true
              schema:
                items:
                  $ref: "#/components/schemas/translateListLanguages_200_response_inner"
                type: array
          description: A list of supported languages
        "401":
          content:
            application/json:
              examples:
                default:
                  summary: Response with unauthorized error
                  value:
                    meta:
                      id: 69c3f5c4168f66b860e951c585550f1c
                      node: us-central1
                      ms: 213
                    data: null
                    error:
                    - code: "2"
                      url: https://help.kagi.com/api/errors#unauthorized

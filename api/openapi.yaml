openapi: 3.0.0
info:
  contact:
    email: support@kagi.com
    name: API Support
    url: https://kagi.com/support
  description: "The Kagi API provides programmatic access to data that powers our\
    \ search results & more. \n\nQuick start for all APIs:\n\n- Create an account\
    \ at [Kagi](https://kagi.com/signup)\n- Generate an [API key](https://kagi.com/settings?p=api)\n\
    - Call the API\n\nWe have the following APIs available.\n### Commercial\n\n- Kagi\
    \ Search API (invite only at the moment)\n- Web and News Enrichment API (public,\
    \ exposes Kagi's own indexes Teclis and TinyGem)\n\n### Free\n\n- Kagi Small Web\
    \ RSS feed (public)\n\n### Official Client Libraries\n\nWe offer the following\
    \ libraries you can use to interact with the Kagi API. These are generated from\
    \ an OpenAPI spec. If you have a language you would like to use and it's not in\
    \ the list, send us a message and we will add it to the list if it is supported.\
    \ Or you can use the [spec](https://wild-wombat.redocly.app/_spec/openapi.yaml?download)\
    \ to build your own custom library.\n\n- [Golang](https://github.com/kagisearch/kagi-api-golang)\n\
    - [Python](https://github.com/kagisearch/kagi-api-python)\n- [Rust](https://github.com/kagisearch/kagi-api-rust)\n\
    \n### Unofficial Client Libraries\n\nThere also exist third party libraries for\
    \ interacting with the Kagi API.\n\n- [kagi-api](https://crates.io/crates/kagi-api)\
    \ for Rust\n- [kagi-api](https://alchemists.io/projects/kagi-api) for Ruby\n-\
    \ [kagi-dotnet](https://github.com/patchoulish/kagi-dotnet) for C#/.NET\n\n###\
    \ API Status\n\nOur existing API, the \"v0\" beta API, is being replaced with\
    \ a new version that will be available publicly soon. As changes are made, we\
    \ will be updating the documentation below when the new features become available.\n\
    \nSee the [Support and Community](https://help.kagi.com/kagi/support-and-community/)\
    \ section for details.\n### Pricing\n\nWe are in the process of moving all APIs\
    \ to a post-paid tiered system, where each tier has a limit on the number of requests\
    \ that can be made. If an API has a pricing section, then it is still being migrated\
    \ over to the new billing system.\n\n### GitHub Discussions\n\nThis is the preferred\
    \ venue for bug reports and feature requests.\n\n- [Bug Reports](https://github.com/kagisearch/kagi-docs/issues/new/choose)\n\
    - [Q&A Forum](https://github.com/kagisearch/kagi-docs/discussions/categories/q-a?discussions_q=category%3AQ%26A+label%3Aproduct%3Akagi_search_api)\n\
    - [API Feature Requests](https://github.com/kagisearch/kagi-docs/discussions/categories/kagi-search-api-feature-requests-ideas)\n\
    \n### Discord\nJoin our [Discord](https://kagi.com/discord)! Good for quick questions\
    \ or chatting about things you've made with our APIs!\n"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Kagi API
  version: 0.1.0
servers:
- description: Production api endpoint
  url: https://kagi.com/api/v1
tags:
- description: |
    The Search API gives programmable access to Kagi's premium search results. These results are pulled from many different sources, including our inhouse indexes, and re ranked inorder surface more interesting and applicable results. Because we do not accept money for paid placement or advertising, the results should natually be more in tune to the search being performed.

    You can read about our approach towards search [on our blog](https://blog.kagi.com/the-many-benefits-of-paying-for-search).

    The API also supports some of the features that we offer through our web UI, mainly Lenses.

    ## Lenses

    Lenses allow more fine grained filtering and control over the search results, and what sort of content is returned. You can read more about how Lenses work in [our documentation](https://help.kagi.com/kagi/features/lenses.html).


    ## Pricing

    Pricing for the Search API is currently being updated, once launched this section will be updated with how much it will cost to use.
  name: Search
  x-displayName: Search API
- description: |
    The Enrichment APIs are a collection of indexes that can be used to supplement other products with more novel content from around the web.

    Enrichment APIs allow anyone to get Kagi's unique results, namely the Teclis index (web results) and TinyGem index (news results).

    They are best used for finding non-commercial websites and "small web" discussions surrounding a particular topic. The news enrichment API offers interesting discussions and news worth reading from typically non-mainstream sources.

    They are not "general" search indexes that can answer any type of query, but rather these results are our "secret sauce" and what makes Kagi results unique and interesting and are best used in combination with a general results index.
    ### Pricing

    Since results are niche, we bill only when non-zero results are returned.
  name: Enrichment
  x-displayName: Enrichment API
- description: |
    The Translate APIs are a collection of endpoints that can be used to translate webpages, documents, and text into different laguages. You can try our amazing [web app here](https://translate.kagi.com/) to get a good idea of what is possible when you don't have to worry about the language of online communication.
  name: Translate
  x-displayName: Translate API
- description: |
    Extract contents from web pages. This endpoint accepts a list of URLs
    and returns the extracted markdown content for each page.
  name: Extract
  x-displayName: Extract API

openapi: 3.0.0
info:
  contact:
    email: support@kagi.com
    name: API Support
    url: https://kagi.com/support
  description: "The Kagi API provides programmatic access to data that powers our\
    \ search results & more. \n\nGet started on the [API Dashboard](https://kagi.com/api)\
    \ to set up billing, manage API keys, and more.\n\n### Official Client Libraries\n\
    \nWe offer the following libraries you can use to interact with the Kagi API.\
    \ These are generated from an OpenAPI spec. If you have a language you would like\
    \ to use and it's not in the list, send us a message and we will add it to the\
    \ list if it is supported. Or you can use the [spec](https://kagi.redocly.app/_spec/openapi.yaml?download)\
    \ to build your own custom library.\n\n- [Golang](https://github.com/kagisearch/kagi-openapi-golang)\n\
    - [Python](https://github.com/kagisearch/kagi-openapi-python)\n- [TypeScript](https://github.com/kagisearch/kagi-openapi-typescript)\n\
    - [Rust](https://github.com/kagisearch/kagi-openapi-rust)\n\n### API Status\n\n\
    **The v1 API is currently in preview to early access testers.**\n\nOur existing\
    \ API, the \"v0\" beta API, is being replaced with a new version that will be\
    \ available publicly soon. As changes are made, we will be updating the documentation\
    \ below when the new features become available.\n\nSee the [Support and Community](https://help.kagi.com/kagi/support-and-community/)\
    \ section for details.\n\n### Pricing\n\nSee our [API Pricing](https://kagi.com/api/pricing)\
    \ page for standard rates.\n\n### GitHub Discussions\n\nThis is the preferred\
    \ venue for bug reports and feature requests.\n\n- [Bug Reports](https://github.com/kagisearch/kagi-docs/issues/new/choose)\n\
    - [Q&A Forum](https://github.com/kagisearch/kagi-docs/discussions/categories/q-a?discussions_q=category%3AQ%26A+label%3Aproduct%3Akagi_search_api)\n\
    - [API Feature Requests](https://github.com/kagisearch/kagi-docs/discussions/categories/kagi-search-api-feature-requests-ideas)\n\
    \n### Discord\n\nJoin our [Discord](https://kagi.com/discord)! Good for quick\
    \ questions or chatting about things you've made with our APIs!\n"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Kagi API
  version: "1"
servers:
- description: Production api endpoint
  url: https://kagi.com/api/v1
tags:
- description: |
    The Search API is a feature-rich endpoint for search products and agents. It gives programmable access to Kagi's premium search results pulled from many different sources - including our in-house indexes - and re-ranked to surface accurate answers and interesting finds. You can read about our approach towards search [on our blog](https://blog.kagi.com/the-many-benefits-of-paying-for-search).

    The API supports most of the features that we offer through our web UI, including [Lenses](https://help.kagi.com/kagi/features/lenses.html).

    You can also request full markdown extraction of the top results in a single API request.
  name: Search
  x-displayName: Search API
- description: |
    Extract contents from web pages, currently in markdown form. This endpoint accepts a list of URLs
    and returns the extracted markdown content for each page.
  name: Extract
  x-displayName: Extract API
paths:
  /search:
    post:
      operationId: search
      requestBody:
        content:
          application/json:
            examples:
              basicSearch:
                description: Simple search showing how to use the search API
                summary: Basic search query
                value:
                  query: steve jobs
                  workflow: search
              snapSearch:
                description: Snaps are supported for quickly searching in individual
                  sites
                summary: Search with snaps
                value:
                  query: '@r headphones'
                  workflow: search
              imageSearch:
                description: "Searching just for images, or other categories is supported\
                  \ using the workflow parameter"
                summary: Search just for images
                value:
                  query: doggo
                  workflow: images
            schema:
              $ref: "#/components/schemas/search_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                default:
                  summary: Response with example search objects
                  value:
                    meta:
                      trace: 69c3f5c4168f66b860e951c585550f1c
                      node: us-central1
                      ms: 213
                      query:
                        raw: steve jobs
                        terms: steve jobs
                        workflow: search
                        fields:
                        - kind: token
                          value: steve
                          name: ""
                          negate: false
                        - kind: token
                          value: jobs
                          name: ""
                          negate: false
                    data:

          description: Contains all search results for podcasts.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        podcast_creator:
          description: Contains all search results for creators of podcasts.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        news:
          description: Contains all search results for news articles.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        adjacent_question:
          description: Contains results that are obtained by searching for slightly
            different queries. These questions are stored under the `props.question`
            path.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        direct_answer:
          description: "If the search query was a math equation, or unit conversions,\
            \ things that can be answered quickly, the result will be in here."
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        interesting_news:
          description: Contains news results from publishers collected and stored
            in Kagi's news index.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        interesting_finds:
          description: Contains small web results from publishers collected and stored
            in Kagi's small web index.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        infobox:
          description: "Contains detailed summary and tabulated information about\
            \ a person, place, or thing."
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        code:
          description: Contains all search results that link to code resources or
            repositories.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        package_tracking:
          description: "If the search query was a package tracking number, the correct\
            \ package tracking website should be present in this collection."
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        public_records:
          description: "Contains all search results for public records, such as government\
            \ documents or public court records."
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        weather:
          description: Contains all search results for the current weather.
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        related_search:
          description: "Contains a list of searches that are related to the current\
            \ search, and may help narrow down the results."
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        listicle:
          description: "Contains all search results that are lists of things. Results\
            \ with titles like \"5 things you didn't know about...\", or \"10 of the\
            \ best headphones\"."
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
        web_archive:
          description: Contains all search results for archived websites that may
            not be available anymore
          items:
            $ref: "#/components/schemas/searchResult"
          type: array
      type: object

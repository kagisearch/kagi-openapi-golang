        dependancies on any of this data.
      example:
        node: node
        trace: trace
        ms: 0
        id: id
      properties:
        trace:
          description: "Trace ID that can be used to debug individual API requests.\
            \ Provide this, if needed, when contacting Kagi support."
          type: string
        id:
          type: string
        node:
          description: The hostname of the node that fulfilled the request.
          type: string
        ms:
          description: "how long the request took to fulfill, excluding round trip\
            \ to the client."
          type: integer
      type: object
    searchResult:
      description: A search result that fulfills the query sent to the kagi API
      example:
        snippet: "Steven Paul Jobs (February 24, 1955 – October 5, 2011) was an American\
          \ businessman, inventor, and investor best known for co-founding the ..."
        image:
          width: 310
          url: https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Steve_Jobs_Headshot_2010-CROP_%28cropped_2%29.jpg/330px-Steve_Jobs_Headshot_2010-CROP_%28cropp    ed_2%29.jpg
          height: 300
        time: 2024-11-29T03:54:26Z
        title: Steve Jobs - Wikipedia
        url: https://en.wikipedia.org/wiki/Steve_Jobs
        props:
          key: ""
      properties:
        url:
          description: The location of the result. This is the direct URL to the resource
            that matches the query
          example: https://en.wikipedia.org/wiki/Steve_Jobs
          type: string
        title:
          description: "This is the title of the resource. For HTML documents, it\
            \ reflects `<title>`. For videos, it is the name that would be displayed\
            \ on the video site."
          example: Steve Jobs - Wikipedia
          type: string
        snippet:
          description: A short summary of the contents of the resource
          example: "Steven Paul Jobs (February 24, 1955 – October 5, 2011) was an\
            \ American businessman, inventor, and investor best known for co-founding\
            \ the ..."
          type: string
        time:
          description: The date when the resource was created or last updated.
          example: 2024-11-29T03:54:26Z
          type: string
        image:
          $ref: "#/components/schemas/searchResult_image"
        props:
          additionalProperties: true
          description: Holds arbitrary result metadata
          type: object
      required:
      - title
      - url
      type: object
    errorDetail:
      description: API error response for Extract operations
      example:
        code: extract.invalid_url
        location: "pages[0].url"
        message: URL must be a valid HTTPS URL
        url: https://help.kagi.com/api/errors#extract.invalid_url
      properties:
        code:
          description: Namespaced error code
          example: extract.invalid_url
          type: string
        url:
          description: URL to error documentation
          example: https://help.kagi.com/api/errors#extract.invalid_url
          format: uri
          type: string
        message:
          description: Human-readable error message
          example: URL must be a valid HTTPS URL
          nullable: true
          type: string
        location:
          description: Field location where the error occurred
          example: "pages[0].url"
          nullable: true
          type: string
      required:
      - code
      - url
      type: object
    errorEnvelope:
      description: API error response envelope containing metadata and an array of
        error details
      example:
        data:
        - ""
        - ""
        meta:
          node: node
          trace: trace
          ms: 0
          id: id
        error:
        - code: extract.invalid_url
          location: "pages[0].url"
          message: URL must be a valid HTTPS URL
          url: https://help.kagi.com/api/errors#extract.invalid_url
        - code: extract.invalid_url
          location: "pages[0].url"
          message: URL must be a valid HTTPS URL
          url: https://help.kagi.com/api/errors#extract.invalid_url
      properties:
        meta:
          $ref: "#/components/schemas/meta"
        data:
          description: Empty data array when error occurs
          items: {}
          nullable: true
          type: array
        error:
          description: Array of error detail objects describing what went wrong
          items:
            $ref: "#/components/schemas/errorDetail"
          type: array
      required:
      - error
      - meta
      type: object
    searchObject:
      example:
        snippet: snippet
        image:
          width: 2
          url: url
          height: 5
        thumbnail:
          width: 5
          url: url
          height: 1
        t: 0
        rank: 6
        published: published
        title: title
        url: url
      properties:
        t:
          description: This is always set to 0. It is used as a flag to identify if
            the result was a rearch result or a related searches object.
          type: integer
        rank:
          description: "Order of resarch results, the highest rank is 1 and should\
            \ identify results that match the search request better."
          type: integer
        url:
          description: URL of the resource identified in the search result.
          type: string
        title:
          description: "Title of the search result. This can be taken from the title\
            \ of the html document, or the title of a media resource."
          type: string
        snippet:
          description: "a short desciption, or summary, of the content."
          type: string
        published:
          description: the date the rearch result was created
          type: string
        thumbnail:
          $ref: "#/components/schemas/searchObject_thumbnail"
        image:
          $ref: "#/components/schemas/searchObject_image"
      type: object
    pageInput:
      description: A single page to extract content from
      properties:
        url:
          description: |
            The HTTPS URL of the page to extract content from.
            Must use HTTPS scheme with a valid host.
          example: https://example.com/article
          format: uri
          type: string
      required:
      - url
      type: object
    extractRequest:
      description: Request body for content extraction
      properties:
        pages:
          description: |
            Array of pages to extract content from. Must contain 1-10 URLs.
            Each URL must be a valid HTTPS URL.
          items:
            $ref: "#/components/schemas/pageInput"
          maxItems: 10
          minItems: 1
          type: array
        timeout:
          description: Optional timeout in seconds for the extraction operation
          example: 30
          format: float
          type: number
        format:
          default: json
          description: Response format
          enum:
          - json
          - markdown
          example: json
          type: string
      required:
      - pages
      type: object
    pageOutput:
      description: Extracted content for a single page
      example:
        markdown: |-
          # Article Title

          This is the extracted content...
        url: https://example.com/article
      properties:
        url:
          description: The URL of the extracted page
          example: https://example.com/article
          format: uri
          type: string
        markdown:
          description: Extracted markdown content of the page
          example: |-
            # Article Title

            This is the extracted content...
          nullable: true
          type: string
      required:
      - url
      type: object
    extractResponse:
      description: Response containing extracted content
      example:
        data:
        - markdown: |-
            # Article Title

            This is the extracted content...
          url: https://example.com/article
        - markdown: |-
            # Article Title

            This is the extracted content...
          url: https://example.com/article
        meta:
          node: node
          trace: trace
          ms: 0
          id: id
        errors:
        - code: extract.invalid_url
          location: "pages[0].url"
          message: URL must be a valid HTTPS URL
          url: https://help.kagi.com/api/errors#extract.invalid_url
        - code: extract.invalid_url
          location: "pages[0].url"
          message: URL must be a valid HTTPS URL
          url: https://help.kagi.com/api/errors#extract.invalid_url
      properties:
        meta:
          $ref: "#/components/schemas/meta"
        data:
          description: Array of extracted page content
          items:
            $ref: "#/components/schemas/pageOutput"
          type: array
        errors:
          description: Optional array of errors that occurred during extraction
          items:
            $ref: "#/components/schemas/errorDetail"
          type: array
      required:
      - data
      - meta
      type: object
    search_request_lens:
      description: "Inline description of a lens to apply to the search. Options supplied\
        \ by the lens take precedence over those supplied by the user in their search\
        \ terms (e.g., `site:` operators), allowing you to restrict the scope of the\
        \ search to return more relevant results in specific applications."
      properties:
        sites_included:
          description: Search only these domains.
          items:
            description: domains
            type: string
          type: array
        sites_excluded:
          description: Exclude these domains from the search.
          items:
            description: domains
            type: string
          type: array
        keywords_included:
          description: Return only results containing these keywords.
          items:
            description: keywords
            type: string
          type: array
        keywords_excluded:
          description: Exclude results containing these keywords.
          items:
            description: keywords
            type: string
          type: array
        file_type:
          description: "A specific file type to search for. (e.g., `pdf`)"
          type: string
        time_after:
          description: Filters for web pages that have been updated or published *after*
            the given date.
          format: date
          type: string
        time_before:
          description: Filters for web pages that have been updated or published *before*
            the given date.
          format: date
          type: string
        time_relative:
          description: "Filters for web pages that have been updated or published\
            \ in the given interval, relative to today's date."
          enum:
          - day
          - week
          - month
          type: string
        search_region:
          description: "Requests results localized to a specific region. Can be any\
            \ valid [ISO-3166-1 Alpha-2 country code](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2#Officially_assigned_code_elements),\
            \ or the special value `no_region`, that will try to get the most general\
            \ results possible."
          type: string
      type: object
    search_request_filters:
      description: Filters to apply to search results for more targeted queries.
      properties:
        region:
          description: Filter results to a specific region using an ISO 3166-1 Alpha-2
            country code. See https://help.kagi.com/api/regions for supported codes.
          type: string
        after:
          description: Filter for results published or updated after this date.
          format: date
          type: string
        before:
          description: Filter for results published or updated before this date.
          format: date
          type: string
      type: object
    search_request_extract:
      description: "Configuration for extracting page content from search results.\
        \ When provided, the API will fetch and extract the content from the specified\
        \ number of result pages."
      properties:
        count:
          description: Number of search results to extract content from. Must be between
            1 and 10.
          maximum: 10
          minimum: 1
          type: integer
        timeout:
          description: "Timeout in seconds for extraction of each page. If omitted,\
            \ uses the default timeout."
          maximum: 4
          minimum: 0.5
          type: number
      type: object
    search_request_personalizations_domains_inner:
      properties:
        domain:
          description: "The domain to personalize (e.g., \"example.com\")."
          type: string
        bias:
          description: Bias value to apply to results from this domain.
          type: number
      type: object
    search_request_personalizations_regexes_inner:
      properties:
        regex:
          description: The regex pattern to match.
          type: string
        replacement:
          description: The replacement string to apply when the pattern matches.
          type: string
      type: object
    search_request_personalizations:
      description: Personalization rules to customize search result ranking. Allows
        specifying domain biases and regex-based replacements.
      properties:
        domains:
          description: Domain-level personalization rules (maximum 1000 rules). Each
            rule can boost or lower the ranking of results from specific domains.
          items:
            $ref: "#/components/schemas/search_request_personalizations_domains_inner"
          type: array
        regexes:
          description: "Regex-based personalization rules (maximum 1000 rules, max\
            \ 1000 bytes per pattern)."
          items:
            $ref: "#/components/schemas/search_request_personalizations_regexes_inner"
          type: array
      type: object
    search_request:
      description: Used to upload the search query
      properties:
        query:
          description: Search query to run.
          type: string
        workflow:
          default: search
          description: Type of results to return.
          enum:
          - search
          - images
          - videos
          - news
          - podcasts
          type: string
        format:
          default: json
          description: Format to serialize the API response as.
          enum:
          - json
          - markdown
          type: string
        lens_id:
          description: Lens to apply to the search. Can be a built-in lens's identifier
            or a lens ID as shown on https://kagi.com/settings/lenses when a lens
            is set to be shareable. Can be just the ID portion of the URL (`https://kagi.com/lenses/ID`)
            or the full URL.
          type: string
        lens:
          $ref: "#/components/schemas/search_request_lens"
        timeout:
          description: "Number of seconds to allow for collecting search results.\
            \ Lower values will return results more quickly, but may be lower quality\
            \ or inconsistent between calls. If omitted, will use the latest recommended\
            \ value by Kagi."
          maximum: 4
          minimum: 0.5
          type: number
        page:
          description: Page number for paginated results. Must be between 1 and 10.
          maximum: 10
          minimum: 1
          type: integer
        limit:
          description: Maximum number of results to return. Must be between 1 and
            1024.
          maximum: 1024
          minimum: 1
          type: integer
        filters:
          $ref: "#/components/schemas/search_request_filters"
        extract:
          $ref: "#/components/schemas/search_request_extract"
        personalizations:
          $ref: "#/components/schemas/search_request_personalizations"
      required:
      - query
      type: object
